name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

jobs:

  test:

    timeout-minutes: 60

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # SUCCESS NOTIFICATION
    - name: Slack Notification Success
      if: success()
      run: |
        REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"✅ Playwright Tests Passed\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTriggered By: ${{ github.actor }}\nReport: ${REPORT_URL}\"
        }" \
        ${{ secrets.SLACK_WEBHOOK_URL }}

    # FAILURE NOTIFICATION
    - name: Slack Notification Failure
      if: failure()
      run: |
        REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"❌ Playwright Tests Failed\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTriggered By: ${{ github.actor }}\nReport: ${REPORT_URL}\"
        }" \
        ${{ secrets.SLACK_WEBHOOK_URL }}